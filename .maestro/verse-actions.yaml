# Copy action on a verse card (cross-platform; share sheet is OS UI and
# flaky to assert, so this flow covers copy only).
appId: com.quranshasam.app
---
- launchApp:
    clearState: true
# iOS shows an "Enable Dictation?" system alert on first launch with fresh
# state (speech-recognition entitlement); system alerts hide the app from
# Maestro. Dismiss it; both steps are optional so Android and repeat runs
# are unaffected.
- runFlow:
    when:
      platform: iOS
    commands:
      - extendedWaitUntil:
          visible: 'Not Now'
          timeout: 15000
          optional: true
      - tapOn:
          text: 'Not Now'
          optional: true
- extendedWaitUntil:
    visible:
      id: 'textSearch.input'
    timeout: 90000
- tapOn:
    id: 'textSearch.input'
- inputText: 'In the name of Allah'
# Close the keyboard via the return key. Since spec 015 the results list
# uses keyboardShouldPersistTaps="handled", so the old tap-to-dismiss
# trick no longer dismisses — Enter is the deterministic way.
- pressKey: Enter
# Dismiss the iOS dictation alert if present (coordinate tap — Maestro's
# iOS driver cannot see system alerts; harmless when absent).
- tapOn:
    point: 50%,61%
- extendedWaitUntil:
    visible:
      id: 'verseCard.1:1'
    timeout: 45000
- tapOn:
    id: 'verseCard.1:1.copy'
# iOS shows an in-app "Copied" overlay Maestro can assert. Android uses
# ToastAndroid — a system overlay Maestro cannot see — so the confirmation
# check is optional; the flow still proves the tap doesn't crash and the
# screen stays responsive.
- extendedWaitUntil:
    visible: 'Copied.*'
    timeout: 5000
    optional: true
- assertVisible:
    id: 'verseCard.1:1'
