# Copy action on a verse card (cross-platform; share sheet is OS UI and
# flaky to assert, so this flow covers copy only).
appId: com.quranshasam.app
---
- launchApp
- extendedWaitUntil:
    visible:
      id: 'textSearch.input'
    timeout: 60000
- tapOn:
    id: 'textSearch.input'
- inputText: 'In the name of Allah'
- extendedWaitUntil:
    visible:
      id: 'verseCard.1:1'
    timeout: 45000
# With the soft keyboard open, RN swallows the first list tap to dismiss it
# (keyboardShouldPersistTaps default). Tap the card once to consume that
# dismissal deterministically, then tap the real target. (Maestro's
# hideKeyboard is unreliable on Android — it can send BACK and exit the app.)
- tapOn:
    id: 'verseCard.1:1'
- extendedWaitUntil:
    visible:
      id: 'verseCard.1:1.copy'
    timeout: 10000
- tapOn:
    id: 'verseCard.1:1.copy'
# iOS shows an in-app "Copied" overlay Maestro can assert. Android uses
# ToastAndroid — a system overlay Maestro cannot see — so the confirmation
# check is optional; the flow still proves the tap doesn't crash and the
# screen stays responsive.
- extendedWaitUntil:
    visible: 'Copied.*'
    timeout: 5000
    optional: true
- assertVisible:
    id: 'verseCard.1:1'
