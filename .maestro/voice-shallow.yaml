# Voice screen renders and the language toggle works. No speech automation —
# spec-011 behavior is unit-tested (VoiceSearchScreen.test.tsx).
appId: com.quranshasam.app
permissions:
  android.permission.RECORD_AUDIO: allow
  ios.permission.MICROPHONE: allow
  ios.permission.SPEECH_RECOGNITION: allow
---
- launchApp:
    clearState: true
# iOS shows an "Enable Dictation?" system alert on first launch with fresh
# state (speech-recognition entitlement); system alerts hide the app from
# Maestro. Dismiss it; both steps are optional so Android and repeat runs
# are unaffected.
- runFlow:
    when:
      platform: iOS
    commands:
      - extendedWaitUntil:
          visible: 'Not Now'
          timeout: 15000
          optional: true
      - tapOn:
          text: 'Not Now'
          optional: true
- extendedWaitUntil:
    visible:
      id: 'textSearch.input'
    timeout: 90000
- tapOn:
    id: 'tab.voice'
- assertVisible:
    id: 'voice.micButton'
- assertVisible:
    id: 'voice.language.arabic'
- assertVisible:
    id: 'voice.language.english'
- tapOn:
    id: 'voice.language.english'
- tapOn:
    id: 'voice.language.arabic'
- assertVisible:
    id: 'voice.micButton'
