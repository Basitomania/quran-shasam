# Bookmark a verse from search, verify on Saved, remove, verify empty.
# Clears app state — test devices only.
appId: com.quranshasam.app
---
- launchApp:
    clearState: true
- extendedWaitUntil:
    visible:
      id: 'textSearch.input'
    timeout: 90000
- tapOn:
    id: 'textSearch.input'
- inputText: 'In the name of Allah'
- extendedWaitUntil:
    visible:
      id: 'verseCard.1:1'
    timeout: 45000
# With the soft keyboard open, RN swallows the first list tap to dismiss it
# (keyboardShouldPersistTaps default). Tap the card once to consume that
# dismissal deterministically, then tap the real target. (Maestro's
# hideKeyboard is unreliable on Android — it can send BACK and exit the app.)
- tapOn:
    id: 'verseCard.1:1'
- extendedWaitUntil:
    visible:
      id: 'verseCard.1:1.bookmark'
    timeout: 10000
- tapOn:
    id: 'verseCard.1:1.bookmark'
- tapOn:
    id: 'tab.saved'
- extendedWaitUntil:
    visible:
      id: 'verseCard.1:1'
    timeout: 10000
# Unbookmark from the saved card → list empties.
- tapOn:
    id: 'verseCard.1:1.bookmark'
- extendedWaitUntil:
    visible:
      id: 'saved.emptyState'
    timeout: 10000
