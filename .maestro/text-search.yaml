# Text search: an exact English phrase surfaces the right verse (1:1).
appId: com.quranshasam.app
---
- launchApp:
    clearState: true
# iOS shows an "Enable Dictation?" system alert on first launch with fresh
# state (speech-recognition entitlement); system alerts hide the app from
# Maestro. Dismiss it; both steps are optional so Android and repeat runs
# are unaffected.
- runFlow:
    when:
      platform: iOS
    commands:
      - extendedWaitUntil:
          visible: 'Not Now'
          timeout: 15000
          optional: true
      - tapOn:
          text: 'Not Now'
          optional: true
- extendedWaitUntil:
    visible:
      id: 'textSearch.input'
    timeout: 90000
- tapOn:
    id: 'textSearch.input'
- inputText: 'In the name of Allah'
# The dictation prompt appears on first keyboard use — dismiss again here.
- runFlow:
    when:
      platform: iOS
    commands:
      - extendedWaitUntil:
          visible: 'Not Now'
          timeout: 5000
          optional: true
      - tapOn:
          text: 'Not Now'
          optional: true
# 300ms debounce + match run.
- extendedWaitUntil:
    visible:
      id: 'verseCard.1:1'
    timeout: 45000
# (Card text like 'Al-Faatiha' is not reliably in the iOS accessibility
# tree inside FlatList cells; the verseCard.1:1 id wait above already
# proves the right verse rendered.)
# Clear resets the results.
- tapOn:
    id: 'textSearch.clear'
- assertNotVisible:
    id: 'verseCard.1:1'
