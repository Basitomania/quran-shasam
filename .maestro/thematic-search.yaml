# Thematic search end-to-end, including the semantic (AI) path.
appId: com.quranshasam.app
---
- launchApp:
    clearState: true
# iOS shows an "Enable Dictation?" system alert on first launch with fresh
# state (speech-recognition entitlement); system alerts hide the app from
# Maestro. Dismiss it; both steps are optional so Android and repeat runs
# are unaffected.
- runFlow:
    when:
      platform: iOS
    commands:
      - extendedWaitUntil:
          visible: 'Not Now'
          timeout: 15000
          optional: true
      - tapOn:
          text: 'Not Now'
          optional: true
- extendedWaitUntil:
    visible:
      id: 'textSearch.input'
    timeout: 90000
- tapOn:
    id: 'tab.themes'
- assertVisible:
    id: 'themes.input'
# Wait for the AI mode to become ready (background ONNX init) — the AI mode
# button shows a checkmark once semantic search is initialized.
- extendedWaitUntil:
    visible: 'AI Search ✓'
    timeout: 90000
- tapOn:
    id: 'themes.input'
- inputText: 'Story of Balqis'
# The dictation prompt appears on first keyboard use — dismiss again here.
- runFlow:
    when:
      platform: iOS
    commands:
      - extendedWaitUntil:
          visible: 'Not Now'
          timeout: 5000
          optional: true
      - tapOn:
          text: 'Not Now'
          optional: true
- tapOn:
    id: 'themes.searchButton'
# Reranked semantic search across 6236 verses; allow inference time.
# Assert by verseCard id (regex) — cell text isn't reliably visible to
# Maestro on iOS. Any An-Naml (surah 27) verse in the results proves the
# AI path returned the Balqis story.
- extendedWaitUntil:
    visible:
      id: 'verseCard\.27:.*'
    timeout: 60000
# Keyword fallback mode still works.
- tapOn:
    id: 'themes.backButton'
- tapOn:
    id: 'themes.mode.keyword'
- tapOn:
    id: 'themes.input'
- inputText: 'patience'
- tapOn:
    id: 'themes.searchButton'
- extendedWaitUntil:
    visible:
      id: 'themes.results'
    timeout: 15000
