# Cold launch reaches the Text Search tab within budget.
appId: com.quranshasam.app
---
- launchApp:
    clearState: true
# iOS shows an "Enable Dictation?" system alert on first launch with fresh
# state (speech-recognition entitlement); system alerts hide the app from
# Maestro. Dismiss it; both steps are optional so Android and repeat runs
# are unaffected.
- runFlow:
    when:
      platform: iOS
    commands:
      - extendedWaitUntil:
          visible: 'Not Now'
          timeout: 15000
          optional: true
      - tapOn:
          text: 'Not Now'
          optional: true
# Quran data may need a first-run download; allow a generous cold budget.
- extendedWaitUntil:
    visible:
      id: 'textSearch.input'
    timeout: 90000
- assertVisible:
    id: 'tab.text'
- assertVisible:
    id: 'tab.voice'
- assertVisible:
    id: 'tab.themes'
- assertVisible:
    id: 'tab.saved'
